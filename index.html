<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Get A Letter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

@import url('https://fonts.cdnfonts.com/css/brittany-signature');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f8f5f1;
font-family:'Inter',sans-serif;
color:#1e1e1e;
min-height:100vh;
overflow:hidden;
position:relative;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.grain{
position:absolute;
inset:0;
opacity:0.03;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
pointer-events:none;
}

.glow{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#efe7dc 0%,transparent 70%);
filter:blur(40px);
z-index:0;
}

.container{
position:relative;
z-index:2;
width:100%;
max-width:1100px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.icon{
font-size:38px;
margin-bottom:18px;
opacity:0.85;
}

h1{
font-family:'Brittany Signature',sans-serif;
font-size:140px;
font-weight:400;
line-height:1;
margin-bottom:10px;
color:#111;
}

.subtitle{
font-size:28px;
font-weight:300;
margin-bottom:12px;
line-height:1.4;
}

.subtitle b{
font-weight:700;
}

.small{
font-size:18px;
letter-spacing:0.5px;
opacity:0.5;
margin-bottom:70px;
}

.counter-box{
background:rgba(255,255,255,0.72);
backdrop-filter:blur(12px);
border:1px solid rgba(0,0,0,0.05);
border-radius:40px;
padding:60px 80px;
box-shadow:
0 20px 60px rgba(0,0,0,0.06);
min-width:320px;
}

.counter-label{
font-size:13px;
letter-spacing:4px;
opacity:0.45;
margin-bottom:20px;
}

.counter{
font-size:120px;
font-weight:700;
line-height:1;
margin-bottom:18px;
color:#111;
}

.counter-desc{
font-size:18px;
opacity:0.55;
}

.secondary{
margin-top:28px;
font-size:16px;
opacity:0.45;
}

.button{
margin-top:45px;
display:inline-flex;
align-items:center;
justify-content:center;
padding:18px 34px;
border-radius:999px;
background:#111;
color:white;
text-decoration:none;
font-size:15px;
font-weight:600;
transition:0.3s ease;
box-shadow:
0 10px 30px rgba(0,0,0,0.12);
}

.button:hover{
transform:translateY(-2px);
opacity:0.92;
}

.footer{
margin-top:24px;
font-size:13px;
opacity:0.35;
}

@media(max-width:768px){

body{
padding:24px;
overflow:auto;
}

h1{
font-size:90px;
}

.subtitle{
font-size:22px;
}

.counter-box{
padding:42px 28px;
width:100%;
}

.counter{
font-size:72px;
}

.small{
margin-bottom:40px;
}

}

</style>
</head>

<body>

<div class="grain"></div>
<div class="glow"></div>

<div class="container">

<div class="icon">✉️</div>

<h1>Get A Letter</h1>

<div class="subtitle">
We write and send <b>REAL</b> letters.
</div>

<div class="small">
Join. Get some. Send some.
</div>

<div class="counter-box">

<div class="counter-label">
LETTERS SENT
</div>

<div id="sent" class="counter">
0
</div>

<div class="counter-desc">
letters sent by the community
</div>

<div class="secondary">
and still travelling across the world
</div>

</div>

<a
class="button"
href="https://www.skool.com/get-a-letter-4493/about"
target="_blank"
>
Join the community
</a>

<div class="footer">
real letters • real people • real connection
</div>

</div>

<script>

const SENT_URL = "https://api.counterapi.dev/v1/zuzanna/letters-sent";

async function loadCounts(){

const sentRes = await fetch(SENT_URL);
const sentData = await sentRes.json();

document.getElementById("sent").innerText =
(sentData.data?.count || 0).toLocaleString();

}

loadCounts();

setInterval(loadCounts,5000);

</script>

</body>
</html>
